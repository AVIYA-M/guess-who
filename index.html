

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>נחש מי - כניסה</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="favicon.ico" type="image/png">
    <script type="module" src="JS/login.js"></script>
</head>
<body>
    <button type="button" onclick="window.location.href='HTML/highList.html'">צפה בטבלת שיאים</button>
    <main id="mainContent">
        <div id="loginSection">
            <h1 id="welcomeMessage">ברוכים הבאים לנחש מי!</h1>
            <form id="loginForm">
                <input type="text" id="playerName" placeholder="הכנס שם שחקן" required>
                <select id="difficulty">
                    <option value="easy">קל</option>
                    <option value="hard">קשה</option>
                </select>
                <button type="submit">התחל משחק</button>
            </form>
        </div>
    </main>
</body>
</html>

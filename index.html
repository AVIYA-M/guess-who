<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נחש מי</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="icon" href="favicon.ico" type="icon">
    <!-- שימוש ב-type="module" הוא חובה לייבוא קבצים -->
    <script src="./JS/script.js" type="module" defer></script>
</head>
<body>
    <header>
        <h1>נחש מי?</h1>
    </header>

    <main id="mainContent">
        <section class="login-container">
            <form id="loginForm">
                <label for="playerName">שם שחקן:</label>
                <input type="text" id="playerName" required minlength="2" placeholder="הכנס שם...">
                
                <label for="difficulty">בחר רמת קושי:</label>
                <select id="difficulty">
                    <option value="easy">קל (ללא הגבלת זמן)</option>
                    <option value="hard">קשה (דקה אחת למשחק)</option>
                </select>

                <button type="submit" id="startBtn">התחל משחק</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy;aviya</p>
    </footer>
</body>
</html>
